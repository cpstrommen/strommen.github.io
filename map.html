<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Travel – Christian Strommen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive map of flights flown by Christian Strommen.">
  <meta name="keywords" content="Christian Strommen, flight map, aviation, routes">

  <link href="assets/favicon.png" rel="icon">
  <link href="assets/favicon.png" rel="shortcut icon">
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png"/>

  <meta property="og:title" content="Flight Map – Christian Strommen">
  <meta property="og:description" content="Interactive map of personal and commercial flights.">
  <meta property="og:image" content="assets/favicon.png">
  <meta property="og:url" content="https://strommen.ch/map.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link href="lib/animate/animate.min.css" rel="stylesheet">
  <link href="styles/bootstrap.min.css" rel="stylesheet">
  <link href="styles/style.css" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    #flight-map {
      width: 100%;
      height: 600px;
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .flight-map-legend {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .legend-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .legend-swatch-pic {
      background-color: #00bcd4;
    }

    .legend-swatch-commercial {
      background-color: #ff9800;
    }
  </style>
</head>

<body>
  <div class="container py-5">
    <div class="row g-5">
      <div class="col-12">
        <h1 class="title pb-3 mb-3">Travel</h1>
      </div>

      <div class="col-12">
        <div id="flight-map" class="shadow"></div>
      </div>

      <div class="col-12 mt-3 flight-map-legend text-light">
        <span class="me-3">
          <span class="legend-swatch legend-swatch-pic"></span>
          General Aviation flights
        </span>
        <span>
          <span class="legend-swatch legend-swatch-commercial"></span>
          Commercial flights
        </span>
      </div>

      <div class="col-12 mt-5">
        <div class="text-light text-center">
          <p class="m-0">Powered by <b>strommen.ch</b></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="js/flight-map-data.js"></script>

  <script>
    const map = L.map('flight-map', {
      scrollWheelZoom: true,
      worldCopyJump: true
    }).setView([30, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const allBounds = L.latLngBounds();

    const COLORS = {
      pic: '#00bcd4',
      commercial: '#ff9800'
    };

    const WORLD_OFFSETS = [-360, 0, 360];

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function toDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function normalizeLng(lng) {
      while (lng > 180) lng -= 360;
      while (lng < -180) lng += 360;
      return lng;
    }

    function shiftLatLng(latlng, lngOffset) {
      return L.latLng(latlng.lat, latlng.lng + lngOffset);
    }

    function shiftSegment(segment, lngOffset) {
      return segment.map(p => L.latLng(p.lat, p.lng + lngOffset));
    }

    function greatCirclePoints(from, to, steps = 96) {
      const lat1 = toRad(from.lat);
      const lon1 = toRad(from.lng);
      const lat2 = toRad(to.lat);
      const lon2 = toRad(to.lng);

      const dLat = lat2 - lat1;
      const dLon = lon2 - lon1;

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;

      const d = 2 * Math.asin(Math.sqrt(a));

      if (!d || isNaN(d)) {
        return [
          { lat: from.lat, lng: from.lng },
          { lat: to.lat, lng: to.lng }
        ];
      }

      const points = [];

      for (let i = 0; i <= steps; i++) {
        const f = i / steps;

        const A = Math.sin((1 - f) * d) / Math.sin(d);
        const B = Math.sin(f * d) / Math.sin(d);

        const x =
          A * Math.cos(lat1) * Math.cos(lon1) +
          B * Math.cos(lat2) * Math.cos(lon2);
        const y =
          A * Math.cos(lat1) * Math.sin(lon1) +
          B * Math.cos(lat2) * Math.sin(lon2);
        const z =
          A * Math.sin(lat1) +
          B * Math.sin(lat2);

        const lat = Math.atan2(z, Math.sqrt(x * x + y * y));
        const lon = Math.atan2(y, x);

        points.push({
          lat: toDeg(lat),
          lng: toDeg(lon)
        });
      }

      return points;
    }

    function unwrapLongitudes(points) {
      if (!points.length) return points;

      const unwrapped = [{ ...points[0] }];

      for (let i = 1; i < points.length; i++) {
        let lng = points[i].lng;
        const prevLng = unwrapped[i - 1].lng;

        while (lng - prevLng > 180) lng -= 360;
        while (lng - prevLng < -180) lng += 360;

        unwrapped.push({
          lat: points[i].lat,
          lng
        });
      }

      return unwrapped;
    }

    function splitAtDateLine(points) {
      if (points.length < 2) return [points];

      const segments = [];
      let current = [points[0]];

      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];

        const prevNorm = normalizeLng(prev.lng);
        const currNorm = normalizeLng(curr.lng);

        if (Math.abs(currNorm - prevNorm) > 180 - 1e-6) {
          segments.push(current);
          current = [curr];
        } else {
          current.push(curr);
        }
      }

      if (current.length) {
        segments.push(current);
      }

      return segments.map(segment =>
        segment.map(p => L.latLng(p.lat, normalizeLng(p.lng)))
      );
    }

    function buildGreatCircleSegments(from, to, steps = 96) {
      const rawPoints = greatCirclePoints(from, to, steps);
      const unwrapped = unwrapLongitudes(rawPoints);
      return splitAtDateLine(unwrapped);
    }

    if (Array.isArray(window.flightLegs) && window.flightLegs.length > 0) {
      window.flightLegs.forEach((leg) => {
        const from = L.latLng(leg.originLat, leg.originLng);
        const to = L.latLng(leg.destLat, leg.destLng);

        const type = leg.type === 'pic' ? 'pic' : 'commercial';
        const color = COLORS[type];

        const arcSegments = buildGreatCircleSegments(from, to, 128);

        const popupHtml = `
          <strong>${leg.origin} → ${leg.dest}</strong><br/>
          <small>${leg.originName || ''}${leg.originName ? ' – ' : ''}${leg.destName || ''}</small><br/>
          ${leg.date ? `<small>${leg.date}</small><br/>` : ''}
          <small>Type: ${type === 'pic' ? 'PIC / personal' : 'Commercial'}</small>
          ${leg.notes ? `<br/>${leg.notes}` : ''}
        `;

        const circleOptions = {
          radius: 3,
          color,
          weight: 1,
          fillColor: color,
          fillOpacity: 0.9
        };

        WORLD_OFFSETS.forEach((offset) => {
          arcSegments.forEach(segment => {
            L.polyline(shiftSegment(segment, offset), {
              color,
              weight: 2.5,
              opacity: 0.8,
              noClip: true
            }).addTo(map).bindPopup(popupHtml);
          });

          L.circleMarker(shiftLatLng(from, offset), circleOptions)
            .addTo(map)
            .bindPopup(popupHtml);

          L.circleMarker(shiftLatLng(to, offset), circleOptions)
            .addTo(map)
            .bindPopup(popupHtml);
        });

        allBounds.extend(from);
        allBounds.extend(to);
      });

      map.fitBounds(allBounds, { padding: [40, 40] });
    }
  </script>
</body>
</html>
